services:
  mirofish:
    image: ghcr.io/666ghj/mirofish:latest
    # 加速镜像（如拉取缓慢可替换上方地址）
    # image: ghcr.nju.edu.cn/666ghj/mirofish:latest
    container_name: mirofish
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads
      - ./backend/app/__init__.py:/app/backend/app/__init__.py
      - ./backend/app/api/__init__.py:/app/backend/app/api/__init__.py
      - ./backend/app/api/multi_strategy.py:/app/backend/app/api/multi_strategy.py
      - ./backend/app/models/multi_strategy_analysis.py:/app/backend/app/models/multi_strategy_analysis.py
      - ./backend/app/services/multi_strategy_orchestrator.py:/app/backend/app/services/multi_strategy_orchestrator.py
      - ./backend/app/services/simulation_config_generator.py:/app/backend/app/services/simulation_config_generator.py
      - ./backend/app/services/simulation_manager.py:/app/backend/app/services/simulation_manager.py
      - ./backend/app/services/stock_data_provider.py:/app/backend/app/services/stock_data_provider.py